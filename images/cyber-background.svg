<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- The large radial gradient creates the "globe" highlight -->
        <radialGradient id="globeGlow" cx="50%" cy="50%" r="60%" fx="50%" fy="50%">
            <stop offset="0%" stop-color="#00C1FF" stop-opacity="0.2" />
            <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0" />
        </radialGradient>
        <!-- The grid pattern -->
        <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
            <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(0, 193, 255, 0.1)" stroke-width="1"/>
        </pattern>
    </defs>
    <!-- A solid black base -->
    <rect width="100%" height="100%" fill="#0A0A0A" />
    <!-- The grid lines -->
    <rect width="100%" height="100%" fill="url(#grid)" />
    <!-- The globe glow effect on top -->
    <rect width="100%" height="100%" fill="url(#globeGlow)" />
</svg>
