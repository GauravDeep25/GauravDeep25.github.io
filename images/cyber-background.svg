<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
    <defs>
        <radialGradient id="globeGlow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
            <stop offset="0%" stop-color="#00C1FF" stop-opacity="0.3" />
            <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0" />
        </radialGradient>
        <filter id="glowFilter">
            <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- Solid black base -->
    <rect width="100%" height="100%" fill="#0A0A0A" />

    <!-- Globe Glow Effect -->
    <circle cx="400" cy="400" r="300" fill="url(#globeGlow)" />

    <!-- Globe Grid Lines -->
    <g stroke="#00C1FF" stroke-opacity="0.3" stroke-width="2">
        <!-- Main Outline -->
        <circle cx="400" cy="400" r="300" fill="none" />
        <!-- Latitude Lines -->
        <ellipse cx="400" cy="400" rx="300" ry="100" fill="none" />
        <ellipse cx="400" cy="400" rx="300" ry="200" fill="none" />
        <line x1="100" y1="400" x2="700" y2="400" />
        <!-- Longitude Lines -->
        <ellipse cx="400" cy="400" rx="100" ry="300" fill="none" />
        <ellipse cx="400" cy="400" rx="200" ry="300" fill="none" />
        <line x1="400" y1="100" x2="400" y2="700" />
    </g>

