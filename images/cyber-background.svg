<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
    <!-- Solid black base -->
    <rect width="100%" height="100%" fill="#0A0A0A" />

    <!-- Blue Globe Outline -->
    <g stroke="#00C1FF" stroke-opacity="0.4" stroke-width="2" fill="none">
        <!-- Main Outline -->
        <circle cx="400" cy="400" r="300" />
        <!-- Latitude Lines -->
        <ellipse cx="400" cy="400" rx="300" ry="100" />
        <ellipse cx="400" cy="400" rx="300" ry="200" />
        <line x1="100" y1="400" x2="700" y2="400" />
        <!-- Longitude Lines -->
        <ellipse cx="400" cy="400" rx="100" ry="300" />
        <ellipse cx="400" cy="400" rx="200" ry="300" />
        <line x1="400" y1="100" x2="400" y2="700" />
    </g>
</svg>
